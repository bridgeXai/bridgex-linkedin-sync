<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BridgeX LinkedIn Sync · 设置</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="page">
      <header>
        <h1>个人设置</h1>
        <p>飞书表格与字段映射已内置，无需填写。请填写你在电脑前操作的身份，以及当前浏览器使用的 LinkedIn 账户代号。</p>
      </header>

      <form id="config-form">
        <section>
          <h2>操作身份</h2>
          <label>
            操作者（你的真实姓名）
            <input
              id="operator-name"
              name="operator"
              type="text"
              autocomplete="name"
              placeholder="例如：李靖"
              required
            />
          </label>
          <label>
            LinkedIn 账户（当前登录的人设代号）
            <input
              id="account-id"
              name="accountId"
              type="text"
              autocomplete="off"
              placeholder="例如：BRGX001、MVP-01、Jason-Park-01"
              required
            />
            <span class="field-hint">自由填写，与 AdsPower 人设一致即可；换账户操作时记得修改</span>
          </label>
        </section>

        <div class="actions">
          <button type="submit" class="btn primary">保存</button>
          <button type="button" id="test-btn" class="btn">测试飞书连接</button>
        </div>
        <p id="status" class="status" role="status" aria-live="polite"></p>
      </form>

      <section id="activity-log" class="activity-log-section">
        <div class="activity-log-header">
          <h2>解析 / 同步记录</h2>
          <div class="activity-log-actions">
            <button type="button" id="refresh-log-btn" class="btn">刷新</button>
            <button type="button" id="clear-log-btn" class="btn">清空</button>
          </div>
        </div>
        <p class="activity-log-hint">本机最近 50 条（截屏解析、消息分类、同步飞书）。同步成功后会删除草稿，但记录仍保留在此。</p>
        <pre id="activity-log-list" class="activity-log-list">加载中…</pre>
      </section>
    </main>
    <script type="module" src="options.js"></script>
  </body>
</html>
